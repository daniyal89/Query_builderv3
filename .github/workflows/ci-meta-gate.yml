name: CI Meta Gate

on:
  push:
    branches:
      - main
      - work
  pull_request:
    branches:
      - main
      - work

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-meta-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Generate frontend JUnit report
        run: npm run test:junit

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend/frontend-test-results.xml

      - name: Publish frontend test annotations
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: frontend/frontend-test-results.xml
          check_name: Frontend Test Report
          detailed_summary: true

      - name: Generate frontend coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend-quality:
    runs-on: ubuntu-latest
    env:
      QUERY_BUILDER_TEST_TMPDIR: test-tmp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests/backend --junitxml=backend-test-results.xml --cov=backend --cov-report=xml:backend-coverage.xml

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend-test-results.xml
            backend-coverage.xml

      - name: Publish backend test annotations
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: backend-test-results.xml
          check_name: Backend Test Report
          detailed_summary: true

  ci-meta-gate:
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - backend-quality
    steps:
      - name: Meta gate passed
        run: echo "Frontend and backend quality checks passed."
