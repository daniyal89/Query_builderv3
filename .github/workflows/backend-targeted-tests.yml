name: Backend Test Suite

on:
  push:
    branches:
      - main
      - work
  pull_request:
    branches:
      - main
      - work

permissions:
  contents: read
  checks: write

concurrency:
  group: backend-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      QUERY_BUILDER_TEST_TMPDIR: test-tmp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend test suite
        run: python -m pytest tests/backend --junitxml=backend-test-results.xml --cov=backend --cov-report=xml:backend-coverage.xml

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend-test-results.xml
            backend-coverage.xml

      - name: Publish backend test annotations
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: backend-test-results.xml
          check_name: Backend Test Report
          detailed_summary: true
